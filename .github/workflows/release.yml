name: Release and Update Homebrew

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Compute tarball sha256
        id: sha
        env:
          TAG: ${{ github.ref_name }}
        run: |
          URL="https://github.com/miguelarios/macos-calendar-mcp/archive/refs/tags/${TAG}.tar.gz"

          HTTP_CODE=000
          for i in 1 2 3; do
            HTTP_CODE=$(curl -sL --fail-with-body -o tarball.tar.gz -w "%{http_code}" "$URL" || echo 000)
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            echo "Attempt $i: got HTTP $HTTP_CODE, retrying in 15s..."
            sleep 15
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Failed to download tarball after 3 attempts (HTTP $HTTP_CODE)"
            exit 1
          fi

          if ! file tarball.tar.gz | grep -q gzip; then
            echo "::error::Downloaded file is not a gzip archive"
            file tarball.tar.gz
            exit 1
          fi

          SHA=$(shasum -a 256 tarball.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tarball sha256: $SHA"

      - name: Open PR on homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          VERSION="${TAG#v}"
          BRANCH="update-macos-calendar-mcp-${VERSION}"
          NEW_URL="https://github.com/miguelarios/macos-calendar-mcp/archive/refs/tags/${TAG}.tar.gz"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/miguelarios/homebrew-tap.git" tap
          cd tap

          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          FORMULA="Formula/macos-calendar-mcp.rb"
          sed -i "s|^\( *\)url \"[^\"]*\"|\1url \"${NEW_URL}\"|" "$FORMULA"
          sed -i "s|^\( *\)sha256 \"[^\"]*\"|\1sha256 \"${SHA}\"|" "$FORMULA"
          sed -i "s|^\( *\)version \"[^\"]*\"|\1version \"${VERSION}\"|" "$FORMULA"

          # Assert substitutions happened
          grep -q "url \"${NEW_URL}\"" "$FORMULA" || { echo "::error::url substitution failed"; exit 1; }
          grep -q "sha256 \"${SHA}\"" "$FORMULA" || { echo "::error::sha256 substitution failed"; exit 1; }
          grep -q "version \"${VERSION}\"" "$FORMULA" || { echo "::error::version substitution failed"; exit 1; }

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          # Commit only if there are changes (re-run safety)
          if ! git diff --cached --quiet; then
            git commit -m "macos-calendar-mcp ${VERSION}"
          fi
          git push --force-with-lease origin "$BRANCH"

          # Create PR only if one doesn't already exist for this branch
          if gh pr list --repo miguelarios/homebrew-tap --head "$BRANCH" --state open --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --repo miguelarios/homebrew-tap \
              --base main \
              --head "$BRANCH" \
              --title "macos-calendar-mcp ${VERSION}" \
              --body "Automated formula update for [v${VERSION}](https://github.com/miguelarios/macos-calendar-mcp/releases/tag/${TAG})."
          else
            echo "PR already exists for branch $BRANCH, skipping creation."
          fi
